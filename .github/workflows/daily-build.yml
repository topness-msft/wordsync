name: Daily Build

on:
  schedule:
    - cron: '30 10 * * *'  # 10:30 UTC daily (episodes typically publish ~10:00 UTC)
  workflow_dispatch:  # allow manual trigger

concurrency:
  group: daily-build
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      has_new: ${{ steps.check_new.outputs.has_new }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: build/requirements.txt

      - name: Install dependencies
        run: pip install -r build/requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run build pipeline
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: python build/build.py --model base --limit 5

      - name: Check for new episodes
        id: check_new
        run: |
          if [ -f new_episodes.json ] && [ "$(cat new_episodes.json)" != "[]" ]; then
            echo "has_new=true" >> "$GITHUB_OUTPUT"
            echo "New episodes found:"
            cat new_episodes.json
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            echo "No new episodes"
          fi

      - name: Upload new episodes manifest
        if: steps.check_new.outputs.has_new == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: new-episodes
          path: new_episodes.json

      - name: Commit new episode data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/ build/translation_cache.json
          if git diff --cached --quiet; then
            echo "No new episodes"
          else
            git commit -m "Add new episode data

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            git pull --rebase origin main
            git push
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest (in case build job pushed)
        run: git pull origin main

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4

  tweet:
    needs: [build, deploy]
    if: needs.build.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download new episodes manifest
        uses: actions/download-artifact@v4
        with:
          name: new-episodes

      - name: Post tweets for new episodes
        uses: actions/github-script@v7
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        with:
          script: |
            const fs = require('fs');
            const crypto = require('crypto');
            const https = require('https');

            const episodes = JSON.parse(fs.readFileSync('new_episodes.json', 'utf8'));
            if (!episodes.length) return;

            function oauthSign(method, url, params, consumerKey, consumerSecret, token, tokenSecret) {
              const nonce = crypto.randomBytes(16).toString('hex');
              const timestamp = Math.floor(Date.now() / 1000).toString();
              const oauthParams = {
                oauth_consumer_key: consumerKey,
                oauth_nonce: nonce,
                oauth_signature_method: 'HMAC-SHA1',
                oauth_timestamp: timestamp,
                oauth_token: token,
                oauth_version: '1.0',
                ...params
              };
              const sorted = Object.keys(oauthParams).sort().map(k =>
                `${encodeURIComponent(k)}=${encodeURIComponent(oauthParams[k])}`
              ).join('&');
              const base = `${method}&${encodeURIComponent(url)}&${encodeURIComponent(sorted)}`;
              const key = `${encodeURIComponent(consumerSecret)}&${encodeURIComponent(tokenSecret)}`;
              const sig = crypto.createHmac('sha1', key).update(base).digest('base64');
              return { ...oauthParams, oauth_signature: sig };
            }

            function postTweet(text) {
              return new Promise((resolve, reject) => {
                const url = 'https://api.twitter.com/2/tweets';
                const signed = oauthSign('POST', url, {},
                  process.env.TWITTER_API_KEY, process.env.TWITTER_API_SECRET,
                  process.env.TWITTER_ACCESS_TOKEN, process.env.TWITTER_ACCESS_SECRET
                );
                const authHeader = 'OAuth ' + Object.keys(signed)
                  .filter(k => k.startsWith('oauth_'))
                  .sort()
                  .map(k => `${encodeURIComponent(k)}="${encodeURIComponent(signed[k])}"`)
                  .join(', ');
                const body = JSON.stringify({ text });
                const req = https.request(url, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': authHeader,
                    'Content-Length': Buffer.byteLength(body)
                  }
                }, (res) => {
                  let data = '';
                  res.on('data', chunk => data += chunk);
                  res.on('end', () => {
                    if (res.statusCode >= 200 && res.statusCode < 300) {
                      resolve(JSON.parse(data));
                    } else {
                      reject(new Error(`Twitter API ${res.statusCode}: ${data}`));
                    }
                  });
                });
                req.on('error', reject);
                req.write(body);
                req.end();
              });
            }

            for (const ep of episodes) {
              const message = `🇩🇪 New episode: ${ep.title}\n\nPractice your German with word-by-word audio highlighting and tap-to-translate.\n\n▶️ https://wordsync.app/player.html?id=${ep.id}`;
              try {
                const result = await postTweet(message);
                core.info(`Tweeted: ${ep.title} (tweet ID: ${result.data.id})`);
              } catch (err) {
                core.warning(`Failed to tweet for episode ${ep.id}: ${err.message}`);
              }
            }
