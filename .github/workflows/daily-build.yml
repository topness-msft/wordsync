name: Daily Build

on:
  schedule:
    - cron: '30 10 * * *'  # 10:30 UTC daily (episodes typically publish ~10:00 UTC)
  workflow_dispatch:  # allow manual trigger

concurrency:
  group: daily-build
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: build/requirements.txt

      - name: Install dependencies
        run: pip install -r build/requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run build pipeline
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: python build/build.py --model base --limit 5

      - name: Commit new episode data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/ build/translation_cache.json
          if git diff --cached --quiet; then
            echo "No new episodes"
          else
            git commit -m "Add new episode data

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            git pull --rebase origin main
            git push
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest (in case build job pushed)
        run: git pull origin main

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
