name: Daily Build

on:
  schedule:
    - cron: '0 8 * * 1-6'  # 08:00 UTC Mon-Sat (~2-3h after DW publishes)
  workflow_dispatch:  # allow manual trigger

concurrency:
  group: daily-build
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      has_new: ${{ steps.check_new.outputs.has_new }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: build/requirements.txt

      - name: Install dependencies
        run: pip install -r build/requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run build pipeline
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: python build/build.py --model base --limit 5

      - name: Check for new episodes
        id: check_new
        run: |
          if [ -f new_episodes.json ] && [ "$(cat new_episodes.json)" != "[]" ]; then
            echo "has_new=true" >> "$GITHUB_OUTPUT"
            echo "New episodes found:"
            cat new_episodes.json
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            echo "No new episodes"
          fi

      - name: Upload new episodes manifest
        if: steps.check_new.outputs.has_new == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: new-episodes
          path: new_episodes.json

      - name: Commit new episode data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/ build/translation_cache.json
          if git diff --cached --quiet; then
            echo "No new episodes"
          else
            git commit -m "Add new episode data

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            git pull --rebase origin main
            git push
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest (in case build job pushed)
        run: git pull origin main

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4

  tweet:
    needs: [build, deploy]
    if: needs.build.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download new episodes manifest
        uses: actions/download-artifact@v4
        with:
          name: new-episodes

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install twitter-api-v2
        run: npm install twitter-api-v2

      - name: Post tweets for new episodes
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: |
          node -e "
          const { TwitterApi } = require('twitter-api-v2');
          const fs = require('fs');

          const client = new TwitterApi({
            appKey: process.env.TWITTER_API_KEY,
            appSecret: process.env.TWITTER_API_SECRET,
            accessToken: process.env.TWITTER_ACCESS_TOKEN,
            accessSecret: process.env.TWITTER_ACCESS_SECRET,
          });

          (async () => {
            const episodes = JSON.parse(fs.readFileSync('new_episodes.json', 'utf8'));
            if (!episodes.length) { console.log('No episodes to tweet'); return; }

            for (const ep of episodes) {
              const link = 'https://wordsync.app/player.html?id=' + ep.id;
              const footer = '\n\n▶️ ' + link;
              const intro = '🇩🇪 Learn German with news from @dwnews:\n\n';
              const maxLen = 280 - intro.length - footer.length;

              // Build headline summary from episode content
              let summary = '';
              if (ep.headlines && ep.headlines.length) {
                summary = ep.headlines.map(h => '• ' + h).join('\n');
                if (summary.length > maxLen) {
                  summary = '';
                  for (const h of ep.headlines) {
                    const line = '• ' + h + '\n';
                    if (summary.length + line.length > maxLen) break;
                    summary += line;
                  }
                  summary = summary.trimEnd();
                }
              } else {
                summary = ep.title;
              }

              const message = intro + summary + footer;
              try {
                const result = await client.v2.tweet(message);
                console.log('Tweeted: ' + ep.title + ' (tweet ID: ' + result.data.id + ')');
              } catch (err) {
                console.warn('Warning: Failed to tweet for episode ' + ep.id + ': ' + err.message);
              }
            }
          })();
          "
