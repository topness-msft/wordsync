<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
  <div class="container">
    <header class="site-header">
      <div class="site-header__row">
        <img src="logo.png" alt="WordSync logo" class="site-logo">
        <div>
          <h1 class="site-title">WordSync</h1>
          <p class="site-subtitle">Follow along with slowly spoken German news</p>
        </div>
        <button id="how-link" class="header-help" aria-label="How it works">?</button>
      </div>
    </header>
    <main>
      <div id="episodes" class="episode-list">
        <div class="loading">Loading episodes…</div>
      </div>
    </main>
    <footer class="site-footer">
      <p>Content © <a href="https://www.dw.com" target="_blank" rel="noopener">Deutsche Welle</a> · <a href="https://github.com/topness-msft/wordsync" target="_blank" rel="noopener">Open source</a></p>
    </footer>
  </div>

  <div class="onboarding hidden" id="onboarding">
    <div class="onboarding__backdrop" id="onboarding-backdrop"></div>
    <div class="onboarding__dialog">
      <div class="onboarding__bars"><span></span><span></span><span></span></div>
      <div class="onboarding__body">
        <h2 class="onboarding__title">Welcome to WordSync</h2>
        <p class="onboarding__desc">Follow along with slowly spoken German news — word by word.</p>
        <div class="onboarding__demos">
          <div class="onboarding__demo">
            <div class="demo-area demo-tap">
              <span class="demo-word">Welt</span>
              <span class="demo-ring"></span>
            </div>
            <p class="demo-label"><strong>Tap</strong> a word to skip playback to there</p>
          </div>
          <div class="onboarding__demo">
            <div class="demo-area demo-hold">
              <span class="demo-word">Heute</span>
              <span class="demo-ring"></span>
              <span class="demo-translation">Today</span>
            </div>
            <p class="demo-label"><strong>Hold</strong> a word to see its translation</p>
          </div>
        </div>
        <label class="onboarding__remember">
          <input type="checkbox" id="onboarding-remember"> Don't show again
        </label>
        <button class="onboarding__btn" id="onboarding-close">Got it</button>
      </div>
    </div>
  </div>

  <script>
    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function formatDuration(seconds) {
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return m + ':' + String(s).padStart(2, '0');
    }

    async function loadEpisodes() {
      const container = document.getElementById('episodes');
      try {
        const res = await fetch('data/episodes.json');
        if (!res.ok) throw new Error('Failed to load episodes');
        const episodes = await res.json();

        container.innerHTML = '';
        if (episodes.length === 0) {
          container.innerHTML = '<p class="empty">No episodes yet.</p>';
          return;
        }

        for (const ep of episodes) {
          const card = document.createElement('a');
          card.href = 'player.html?id=' + encodeURIComponent(ep.id);
          card.className = 'episode-card';

          var img = document.createElement('img');
          img.className = 'episode-thumb';
          img.src = ep.imageUrl;
          img.alt = '';

          var time = document.createElement('time');
          time.className = 'episode-date';
          time.textContent = formatDate(ep.date);

          var title = document.createElement('h2');
          title.className = 'episode-title';
          title.textContent = ep.title;

          var dur = document.createElement('span');
          dur.className = 'episode-duration';
          dur.textContent = formatDuration(ep.duration);

          var info = document.createElement('div');
          info.className = 'episode-info';
          info.appendChild(time);
          info.appendChild(title);
          info.appendChild(dur);

          card.appendChild(img);
          card.appendChild(info);

          container.appendChild(card);
        }
      } catch (err) {
        container.innerHTML = '<p class="error">Could not load episodes.</p>';
        console.error(err);
      }
    }

    document.addEventListener('DOMContentLoaded', loadEpisodes);

    // How it works popup
    var onboarding = document.getElementById('onboarding');
    var onboardingRemember = document.getElementById('onboarding-remember');
    var rememberLabel = onboardingRemember.closest('label');

    function dismissOnboarding() {
      if (onboardingRemember.checked) {
        localStorage.setItem('wordsync-onboarding-dismissed', '1');
      } else {
        sessionStorage.setItem('wordsync-onboarding-dismissed', '1');
      }
      onboarding.classList.add('hidden');
    }

    // Auto-show on first visit
    if (!localStorage.getItem('wordsync-onboarding-dismissed') &&
        !sessionStorage.getItem('wordsync-onboarding-dismissed')) {
      rememberLabel.style.display = '';
      onboarding.classList.remove('hidden');
    }

    document.getElementById('how-link').addEventListener('click', function () {
      rememberLabel.style.display = 'none';
      onboarding.classList.remove('hidden');
    });
    document.getElementById('onboarding-close').addEventListener('click', dismissOnboarding);
    document.getElementById('onboarding-backdrop').addEventListener('click', dismissOnboarding);
  </script>
</body>
</html>
