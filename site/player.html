<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordSync – Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="logo.png">
</head>
<body class="player-page">
  <div class="onboarding hidden" id="onboarding">
    <div class="onboarding__backdrop" id="onboarding-backdrop"></div>
    <div class="onboarding__dialog">
      <div class="onboarding__bars"><span></span><span></span><span></span></div>
      <div class="onboarding__body">
        <h2 class="onboarding__title">Welcome to WordSync</h2>
        <p class="onboarding__desc">Follow along with slowly spoken German news — word by word.</p>
        <div class="onboarding__demos">
          <div class="onboarding__demo">
            <div class="demo-area demo-tap">
              <span class="demo-word">Welt</span>
              <span class="demo-ring"></span>
            </div>
            <p class="demo-label"><strong>Tap</strong> a word to skip playback to there</p>
          </div>
          <div class="onboarding__demo">
            <div class="demo-area demo-hold">
              <span class="demo-word">Heute</span>
              <span class="demo-ring"></span>
              <span class="demo-translation">Today</span>
            </div>
            <p class="demo-label"><strong>Hold</strong> a word to see its translation</p>
          </div>
        </div>
        <label class="onboarding__remember">
          <input type="checkbox" id="onboarding-remember"> Don't show again
        </label>
        <button class="onboarding__btn" id="onboarding-close">Got it</button>
      </div>
    </div>
  </div>

  <div class="container">
    <header class="player-header">
      <a href="index.html" class="back-link">← Episodes</a>
      <h1 id="episode-title" class="episode-heading"></h1>
      <time id="episode-date" class="episode-date"></time>
    </header>
    <main id="transcript" class="transcript">
      <div class="loading">Loading transcript…</div>
    </main>
  </div>

  <div class="popup-overlay" id="popup-overlay"></div>
  <div id="translation-popup" class="translation-popup">
    <div class="popup__card">
      <div class="popup__bars"><span></span><span></span><span></span></div>
      <div class="popup__content">
        <strong class="popup-word"></strong>
        <span class="popup-translation"></span>
        <button class="popup__close" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <div class="player-bar" id="player-bar">
    <div class="player-progress-wrap" id="progress-wrap">
      <div class="player-progress-fill" id="progress-fill"></div>
    </div>
    <div class="player-controls">
      <button id="play-btn" class="play-btn" aria-label="Play">
        <svg class="icon-play" viewBox="0 0 24 24" width="28" height="28"><polygon points="6,3 20,12 6,21" fill="currentColor"/></svg>
        <svg class="icon-pause hidden" viewBox="0 0 24 24" width="28" height="28"><rect x="5" y="3" width="4" height="18" fill="currentColor"/><rect x="15" y="3" width="4" height="18" fill="currentColor"/></svg>
      </button>
      <button id="skip-btn" class="skip-btn" aria-label="Forward 10 seconds">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z" fill="currentColor"/><text x="12" y="16.5" fill="currentColor" font-size="8" font-weight="700" text-anchor="middle" font-family="sans-serif">10</text></svg>
      </button>
      <div class="player-time">
        <span id="current-time">0:00</span> / <span id="total-time">0:00</span>
      </div>
      <button id="speed-btn" class="speed-btn" aria-label="Playback speed">1.0×</button>
      <button id="help-btn" class="help-btn" aria-label="How to use">?</button>
    </div>
  </div>

  <audio id="audio" preload="auto"></audio>
  <script src="js/player.js"></script>
</body>
</html>
